{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}My Website{% endblock %}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    {% load static %}
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
   
}



.top-nav {
    background-color: #efeff1;
    width: 100%;
    margin: 0;          
    padding: 1px;
    display: flex;
     justify-content: center;
    align-items: center;
    position: relative; 
    
}

.logo img {
    height: 60px;   /* adjust as needed */
    width: auto;    /* keep aspect ratio */
    margin-left: 100px;
    

}
.search-icon-wrapper {
    display: flex;
    align-items: center;
    width: 100%;
    max-width: 650px;
    gap: 15px;
}

.nav-icons {
    margin-left: auto; /* pushes icons to right */
}

/* Search box */
.search-box {
    display: flex;
    align-items: center;
    background: #fffefe;
    border-radius: 15px;
    padding: 5px 16px;
    flex: 1 1 0; 
    min-width: 0; 
    box-shadow: 5px 5px 20px rgba(0, 0, 0, 0.2);
   
}

.search-box input {
    flex: 1 1 0; 
    border: none;
    background: transparent;
    outline: none;
    font-size: 1.1rem;
    
    
}

.search-btn {
    background: transparent;
    border: none;
    font-size: 1.4rem;
    cursor: pointer;
    margin-left: 5px;

    
}

.user-icon {
    font-size: 2.8rem;
    color: white;
    text-decoration: none;
    flex: 0 0 auto; 
    
}

.logo1 {
    text-decoration: none; 
    color: #FFD43B;        /* text color */
    font-size: 1.5rem;     
    gap:70px;      
    
}
.nav_link {
    transition: transform 0.2s ease, color 0.2s ease;
    will-change: transform;
    transform: translateZ(0);
      border: none !important;
   
}

.nav_link:hover {
    color: #1d1919;
    transform: scale(1.05);
}


.hover-dropdown:hover .dropdown-menu {
    display: block;
    margin-top: 0;
}
.dropdown-item:focus,
.dropdown-item:active {
  background-color: transparent !important;
  color: inherit !important;
  box-shadow: none !important;
}
.nav-icons a {
    text-decoration: none;
   
}
</style>
</head>
<body>

<header>
    
   <div class="top-nav">
   <div style="position:absolute; left:20px; top:50%; transform:translateY(-50%);">
    <a href="javascript:history.back()" style="text-decoration:none; font-size:20px; color:white;">
        <img src="{% static 'image/vector.png' %}" alt="Logo" style="width:28px; height:28px;">
    </a>
</div>
    <a href="{% url 'shop:home' %}" class="logo me-4">
        <img class = "rounded-3" src="{% static 'image/sesi.jpeg' %}" alt="Logo">
        
    </a>
    <div class="btn-group hover-dropdown">
  <button class="btn dropdown-toggle nav_link" type="button" data-bs-toggle="dropdown" data-bs-auto-close="inside" aria-expanded="false">
     Category
  </button>
  <ul class="dropdown-menu">
    <li><a class="dropdown-item" href="#">Home and Kitchen</a></li>
    <li><a class="dropdown-item" href="#">Men's Clothing</a></li>
    <li><a class="dropdown-item" href="#">Men's Shoes</a></li>
    <li><a class="dropdown-item" href="#">Women's Shoes</a></li>
    <li><a class="dropdown-item" href="#">Women's Shoes</a></li>
  </ul>
</div>


   
  <div class="search-icon-wrapper">
    
    <form class="search-box me-3">
        <input type="search" placeholder="Search by film, actors">
        <button class="btn search-btn" type="submit">
            <i class="bi bi-search"></i>
        </button>
    </form>

    <div class="nav-icons d-flex align-items-center gap-2">
<a href="{% url 'shop:profile' request.user.id %}"
   class=" mt-3 me-3 d-flex flex-column align-items-center">

  {% if profile.Image %}
    <img src="{{ profile.Image.url }}"
         style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
  {% else %}
    <img src="{% static 'image/profile.png' %}"
         style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
  {% endif %}

  <small class="mt-1">{{ profile.user.username }}</small>

</a>

        <a href="{% url 'shop:home' %}">
            <img style="width:30px; height:30px;" src="{% static 'image/cart.png' %}">
        </a>
    </div>

</div>

 
</header>

<main>
    {% block content %}
    {% endblock %}
</main>

</body>
</html>
