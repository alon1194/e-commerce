{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}My Website{% endblock %}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    {% load static %}
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
   
}



.top-nav {
    background-color: #1d3f91;
    width: 100%;
    margin: 0;          
    padding: 20px;
    display: flex;
     justify-content: flex-start;
    align-items: center;
    position: relative; 
    
}

.logo img {
    height: 60px;   /* adjust as needed */
    width: auto;    /* keep aspect ratio */
    margin-left: 100px;
    

}
.search-icon-wrapper {
    display: flex;
    align-items: center;
    width: 100%;
    max-width: 650px;
    gap: 50px; 
     margin-left:175px; 
}

/* Search box */
.search-box {
    display: flex;
    align-items: center;
    background: #e3e3e3;
    border-radius: 15px;
    padding: 5px 16px;
    flex: 1 1 0; 
    min-width: 0; 
    box-shadow: 5px 5px 20px rgba(0, 0, 0, 0.2);
   
}

.search-box input {
    flex: 1 1 0; 
    border: none;
    background: transparent;
    outline: none;
    font-size: 1.1rem;
    
    
}

.search-btn {
    background: transparent;
    border: none;
    font-size: 1.4rem;
    cursor: pointer;
    margin-left: 5px;

    
}

.user-icon {
    font-size: 2.8rem;
    color: white;
    text-decoration: none;
    flex: 0 0 auto; 
}

.logo1 {
    text-decoration: none; 
    color: #FFD43B;        /* text color */
    font-size: 1.5rem;     
    gap:70px;      
    
}

</style>
</head>
<body>

<header>
    
   <div class="top-nav">
     <div style="position:absolute; top:50%; transform:translateY(-50%);">
            <a href="javascript:history.back()" style="text-decoration:none; font-size:20px; color:white;">
                <img src="{% static 'image/vector.png' %}" alt="Logo" style="width:28px; height:28px;">
            </a>
        </div>
    <a href="{% url 'shop:home' %}" class="logo">
        <img src="{% static 'image/sesi.jpeg' %}" alt="Logo">
        
    </a>

   
    <div class="search-icon-wrapper">
        <form class="search-box">
            <input type="search" placeholder="Search by film, actors">
            <button class="btn search-btn" type="submit">
                <i class="bi bi-search"></i>
            </button>
        </form>
       
            <i class="bi bi-person-circle"></i>
        </a>
        <nav class="navbar navbar-light bg-light mb-3">
 
</nav>
    </div>
</div>

 
</header>

<main>
    {% block content %}
    {% endblock %}
</main>

</body>
</html>
