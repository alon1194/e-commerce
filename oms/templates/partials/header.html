{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}My Website{% endblock %}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    {% load static %}
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
}
.header-container{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:20px;

    width:fit-content;
    margin:0 auto;
    padding:0 20px;
}

.header{
    width:100%;
    background:#efeff1;
    display:flex;
    justify-content:center;
    padding:12px 0;
}

.logo{
    flex-shrink:0;
}

.logo img{

    width:58px;
    height:58px;

    border-radius:10px;
    object-fit:cover;
}
.search-box{
    width:450px;      /* adjust to 400px, 450px, 500px */
    height:45px;

    display:flex;
    align-items:center;

    background:#fff;
    border-radius:25px;

    padding:0 15px;

    box-shadow:0 3px 12px rgba(0,0,0,.12);
}
.header-center{

    display:flex;
    justify-content:center;

}

.search-box i{

    color:#777;
    margin-right:10px;
    font-size:18px;

}

.search-box input{

    width:100%;
    border:none;
    outline:none;
    background:transparent;

    font-size:16px;

}

.header-right{

    display:flex;
    align-items:center;
    gap:15px;

    flex-shrink:0;
}

.profile img{

    width:42px;
    height:42px;

    border-radius:50%;
    object-fit:cover;
}

.cart img{

    width:32px;
    height:32px;
}

@media(max-width:768px){
    .header-container{
        width:100%;
        justify-content:space-between;
        gap:8px;
    }

.header{

    height:60px;

    padding:0 8px;

    gap:8px;
}

.logo img{

    width:38px;
    height:38px;
}

 .search-box{
        width:auto;
        flex:1;
        min-width:0;
        height:36px;
    }


.search-box i{

    font-size:14px;

    margin-right:6px;
}

.search-box input{

    font-size:12px;
}


    .logo img{
        width:40px;
        height:40px;
    }

    .profile img{
        width:30px;
        height:30px;
    }

    .cart img{
        width:24px;
        height:24px;
    }

}
</style>
</head>

<header class="header">

    <div class="header-container">

        <!-- Logo -->
        <div class="header-left">
        <a href="{% url 'shop:home' %}" class="logo">
            <img src="{% static 'image/sesi.jpeg' %}">
        </a>
    </div>

        <!-- Search -->
        <form class="search-box">
            <i class="bi bi-search"></i>
            <input type="search" placeholder="Search products...">
        </form>

    <!-- Right -->
    <div class="header-right">

        <a href="{% url 'shop:profile' request.user.id %}" class="profile">

            {% if profile.Image %}
                <img src="{{ profile.Image.url }}">
            {% else %}
                <img src="{% static 'image/profile.png' %}">
            {% endif %}

        </a>

        <a href="{% url 'shop:home' %}" class="cart">
            <img src="{% static 'image/cart.png' %}">
        </a>

    </div>

</header>

<main>
    {% block content %}
    {% endblock %}
</main>

</body>
</html>
