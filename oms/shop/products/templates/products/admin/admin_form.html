{% extends "base.html" %}
{% load django_bootstrap5 %}
{% block content %}

<h1>
    {% if view.object %}
        Edit Category
    {% else %}
        Create Category
    {% endif %}
</h1>

<form method="post">
    {% csrf_token %}
    {% bootstrap_form form %}
    <!-- {{ form.as_p }} -->
    <button class="btn btn-primary shadow" type="submit">Save</button>
</form>

<a href="{% url 'shop:products:admin_categories_list' %}">Back to list</a>

{% endblock %}
