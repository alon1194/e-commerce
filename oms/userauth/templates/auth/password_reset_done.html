{% extends "base2.html" %}
{% block title %}Email Sent{% endblock %}
{% load static %}

{% block content %}
<div class="container-fluid login-bg d-flex justify-content-center align-items-center">
  <div class="login-box border rounded-5 p-4 bg-dark bg-opacity-75" style="width:400px">
    <h3 class="mb-4 text-white text-center">Email Sent</h3>
    <p class="text-light text-center">
      If an account with that email exists, a password reset link has been sent.
    </p>
    <p class="text-light text-center mt-3">
      <a href="{% url 'userauth:login' %}" class="text-decoration-none text-white">&larr; Back to Login</a>
    </p>
  </div>
</div>
{% endblock %}
