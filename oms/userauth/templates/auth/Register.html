{% extends "base2.html" %}
{% block title %}Register{% endblock %}
{% load static %}

{% block content %}
<style>
  .login-bg {
    height: 100vh;
    background-image: url("{% static 'image/login.jpg' %}");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  .login-box {
    backdrop-filter: blur(2px);
  }
</style>

<div class="container-fluid login-bg d-flex justify-content-center align-items-center">
    <div class=" mb-3" style =" display: flex; ">
    <h1 class = "text-light  " style = " margin-right:40px; margin-bottom: 20px;  font-family: 'Fredoka', sans-serif; font-size:40px; ">Register to SESI </h1>
  
  </div>
    <div class="login-box border rounded p-4 bg-dark bg-opacity-75 me-5" style = "height:560px; width:400px">
     
 <form method="post">
  {% csrf_token %}


  <div class="mb-3">
    <label class="form-label text-white">Username</label>
    {{ form.username }}
  </div>

  <div class="mb-3">
    <label class="form-label text-white ">Email</label>
    {{ form.email }}
  </div>

  <div class="mb-3">
    <label class="form-label text-white">Birth Date</label>
    {{ form.birth_date }}
  </div>
<div class="mb-3 row align-items-center">
  <label class="col-sm-4 col-form-label text-white">Password</label>
  <div class="col-sm-12">
    {{ form.password1 }}
  </div>
</div>

  <div class="mb-3">
    <label class="form-label text-white">Confirm Password</label>
    {{ form.password2 }}
  </div>

   <div class="d-flex justify-content-end">
  <button type="submit" class="btn btn-primary  border border-info">Register</button>
  </div>
</form>
    </div>
</div>
<script>
const input = document.getElementById("birth-date");

input.addEventListener("input", () => {
    let value = input.value.replace(/\D/g, '');
    let formatted = '';

    if (value.length > 0) {
        formatted += value.substring(0, 2);
    }
    if (value.length > 2) {
        formatted += '-' + value.substring(2, 4);
    }
    if (value.length > 4) {
        formatted += '-' + value.substring(4, 8);
    }

    input.value = formatted;
});
</script>

{% endblock %}
