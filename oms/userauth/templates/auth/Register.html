{% extends "base2.html"%}
{% block title %}Login{% endblock %}
{% load static %}

{% block content %}
<style>
  .login-bg {
    height: 100vh;
    background-image: url("{% static 'image/login.jpg' %}");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  .login-box {
  
    backdrop-filter: blur(2px);
  }
</style>

<div class="container-fluid  flex-column login-bg d-flex justify-content-center  align-items-center">
   <form method="post">
    {% csrf_token %}
   <div>
   </div>
  <div class="login-box border rounded p-4 bg-dark bg-opacity-75 me-5" style = "height:560px; width:400px">
    <h3 class="mb-3 text-white text-center" style = " font-family: 'Fredoka', sans-serif">Register to SESI</h3>

    <div class="mb-3">
      <label class="form-label text-white" style = " font-family: 'Fredoka', sans-serif">First name </label>
      <input type="text" class="form-control" placeholder="Enter username">
    </div>

    <div class="mb-3">
      <label class="form-label text-white"style = " font-family: 'Fredoka', sans-serif">Email</label>
      <input type="password" class="form-control" placeholder="Enter your Email">
    </div>
     <div class="mb-3">
      <label class="form-label text-white"style = " font-family: 'Fredoka', sans-serif">Password </label>
      <input type="password" class="form-control" placeholder="Enter password">
    </div>
     <div class="mb-3">
      <label class="form-label text-white"style = " font-family: 'Fredoka', sans-serif">Confirm Password </label>
      <input type="password" class="form-control" placeholder="Confim  password">
    </div>

    <div class="d-flex justify-content-end">
      <button class=" login-box btn btn-primary"style = " font-family: 'Fredoka', sans-serif">SignUp</button>
    </div>
  </div>

  


</div>
{% endblock %}
