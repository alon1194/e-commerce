{% extends "base2.html" %}
{% block title %}Set New Password{% endblock %}
{% load static %}

{% block content %}
<style>
  .login-bg {
    height: 100vh;
    background-image: url("{% static 'image/login.jpg' %}");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  .login-box {
    backdrop-filter: blur(2px);
  }

  .form-control {
    border: none;
    border-bottom: 2px solid #aaa;
    background: transparent;
    color: white;
    transition: border-color 0.3s;
  }

  .form-control:focus {
    outline: none;
    box-shadow: none;
    border-bottom: 2px solid #0d6efd;
  }

  .form-control::placeholder {
    color: #aaa;
    opacity: 1;
  }
</style>

<div class="container-fluid login-bg d-flex justify-content-center align-items-center">
  <div class="login-box border rounded-5 p-4 bg-dark bg-opacity-75" style="width:400px">
    <h3 class="mb-4 text-white text-center" style="font-family: 'Fredoka', sans-serif">
      Set New Password
    </h3>

    <form method="post">
      {% csrf_token %}
      {{ form.non_field_errors }}

      <div class="mb-3">
        <label class="form-label text-white">New Password</label>
        {{ form.new_password1 }}
      </div>

      <div class="mb-3">
        <label class="form-label text-white">Confirm New Password</label>
        {{ form.new_password2 }}
      </div>

      <div class="d-flex justify-content-end">
        <button type="submit" class="btn btn-primary" style="font-family: 'Fredoka', sans-serif">
          Set Password
        </button>
      </div>
    </form>

    <p class="text-light mt-3 text-center" style="font-size:14px">
      <a href="{% url 'userauth:login' %}" class="text-decoration-none text-white">&larr; Back to Login</a>
    </p>
  </div>
</div>
{% endblock %}
