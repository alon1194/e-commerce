{% extends "base2.html"%}
{% block title %}Login{% endblock %}
{% load static %}

{% block content %}

<style>
  .login-bg {
    height: 100vh;
    background-image: url("{% static 'image/login.jpg' %}");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  .login-box {
  
    backdrop-filter: blur(2px);
  }
</style>

<div class="container-fluid  flex-column login-bg d-flex justify-content-center  align-items-center">
   <div>
    <h1 class = "text-light   " style = " margin-right:40px; margin-bottom: 20px;  font-family: 'Fredoka', sans-serif">Welcome to SESI </h1>
   </div>
  <div class="login-box border rounded p-4 bg-dark bg-opacity-75 me-5" style = "height:360px; width:400px">
    <h3 class="mb-3 text-white text-center" style = " font-family: 'Fredoka', sans-serif">Login</h3>

    <div class="mb-3">
      <label class="form-label text-white" style = " font-family: 'Fredoka', sans-serif">Username</label>
      <input type="text" class="form-control" placeholder="Enter username">
    </div>

    <div class="mb-3">
      <label class="form-label text-white"style = " font-family: 'Fredoka', sans-serif">Password</label>
      <input type="password" class="form-control" placeholder="Enter password">
    </div>

    <div class="d-flex justify-content-end">
      <button class=" login-box btn btn-primary"style = " font-family: 'Fredoka', sans-serif">Login</button>
    </div>
  </div>

  
<p class="text-light mt-2 text-start" style=" margin-right:50px; font-weight:600; font-size:18px;">
  Don't have an account? 
  <a href="{% url 'userauth:Register' %}" class="text-dark  text-decoration-none">Sign up</a>
</p>

</div>
{% endblock %}
